<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bronzeville Trail — Baseline Data Explorer</title>
<script src="vendor/d3.v7.min.js"></script>
<style>
  :root {
    --navy: #16283f;
    --navy-light: #24405f;
    --gray-bar: #bcbec0;
    --gray-text: #58595b;
    --gray-sub: #808285;
    --red: #e1251b;
    --bg: #ffffff;
    --rule: #e6e7e8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #f4f5f6;
    color: var(--gray-text);
  }
  .app {
    max-width: 1060px;
    margin: 24px auto 48px;
    background: var(--bg);
    padding: 36px 44px 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }
  .kicker {
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--gray-sub);
    margin: 0 0 6px;
    font-weight: 700;
  }
  h1.headline {
    font-size: 30px;
    line-height: 1.15;
    margin: 0 0 8px;
    color: var(--gray-text);
    font-weight: 700;
  }
  p.deck-sub {
    font-size: 17px;
    margin: 0 0 22px;
    color: var(--gray-sub);
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: flex-end;
    padding: 14px 0 18px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 10px;
  }
  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .1em;
    font-weight: 700;
    color: var(--gray-sub);
  }
  select {
    font: 14px/1.3 inherit;
    color: var(--gray-text);
    padding: 7px 10px;
    border: 1px solid #c9cbcd;
    border-radius: 3px;
    background: #fff;
    max-width: 340px;
  }
  .view-toggle { display: flex; border: 1px solid #c9cbcd; border-radius: 3px; overflow: hidden; }
  .view-toggle button {
    font: 700 12px/1 inherit;
    letter-spacing: .04em;
    padding: 9px 14px;
    border: none;
    background: #fff;
    color: var(--gray-sub);
    cursor: pointer;
  }
  .view-toggle button.active { background: var(--navy); color: #fff; }
  #chart { width: 100%; }
  svg { display: block; width: 100%; height: auto; }
  .bar-label {
    font-size: 15px;
    font-weight: 700;
    fill: var(--gray-sub);
  }
  .axis text { font-size: 12.5px; fill: var(--gray-sub); font-weight: 600; }
  .axis-x text { font-size: 11px; letter-spacing: .04em; }
  .axis path, .axis line { stroke: #d9dadb; }
  .zero-line { stroke: #a7a9ac; stroke-width: 1.2; }
  .legend { display: flex; gap: 22px; margin: 4px 0 2px; font-size: 12.5px; font-weight: 600; }
  .legend .swatch { display: inline-block; width: 13px; height: 13px; margin-right: 6px; vertical-align: -2px; }
  .footnote {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--gray-sub);
    font-weight: 700;
    margin-top: 18px;
    border-top: 1px solid var(--rule);
    padding-top: 12px;
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--navy);
    color: #fff;
    font-size: 12.5px;
    line-height: 1.45;
    padding: 8px 11px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity .12s;
    max-width: 240px;
    z-index: 10;
  }
  .tooltip strong { font-size: 13px; }
</style>
</head>
<body>
<div class="app">

    </div>
  </div>

  <div id="chart"></div>
  <p class="footnote" id="source"></p>
</div>

/* ============ STATE + CONTROLS ============ */

const indSel = d3.select("#indicator");
indSel.selectAll("option").data(INDICATORS).join("option")
  .attr("value", d => d.id).text(d => d.title);
indSel.on("change", function() {
  state.indicator = INDICATORS.find(i => i.id === this.value);
  state.metric = state.indicator.metrics[0];
  if (state.indicator.single) state.view = "change";
  populateMetrics(); syncToggle(); render();
});

const metSel = d3.select("#metric");
function populateMetrics() {
  metSel.selectAll("option").data(state.indicator.metrics, d => d.id).join("option")
    .attr("value", d => d.id).text(d => d.name);
  metSel.property("value", state.metric.id);
}
metSel.on("change", function() {
  state.metric = state.indicator.metrics.find(m => m.id === this.value);
  render();
});

d3.select("#viewToggle").selectAll("button").on("click", function() {
  state.view = this.dataset.view;
  syncToggle(); render();
});
function syncToggle() {
  const single = !!state.indicator.single;
  d3.select("#viewToggle").selectAll("button")
    .classed("active", function() { return this.dataset.view === state.view; })
    .attr("disabled", function() { return (single && this.dataset.view === "levels") ? true : null; })
    .style("opacity", function() { return (single && this.dataset.view === "levels") ? 0.35 : 1; });
  d3.select("#viewToggle").select('[data-view="change"]')
    .text(single ? "2023 Level" : "Change 2010–2023");
}

/* ============ FORMATTERS ============ */
const fmtCount = d3.format(",");
const fmtUsd = v => "$" + d3.format(",")(Math.round(v));
function fmtLevel(v, format) {
  if (v == null) return "–";
  if (format === "pct") return v.toFixed(1) + "%";
  if (format === "usd") return fmtUsd(v);
  return fmtCount(v);
}
/* change: % change for counts/dollars, percentage-point diff for shares */
function changeValue(m, geo) {
  const [a, b] = m.values[geo.id];
  if (state.indicator.single) return b;                 // 2023 level
  if (m.format === "pct") return +(b - a).toFixed(1);   // pp
  if (a === 0) return null;
  return +(((b - a) / a) * 100).toFixed(1);
}
function fmtChange(v, m) {
  if (v == null) return "n/a";
  if (state.indicator.single) return v.toFixed(1) + "%";
  const sign = v > 0 ? "" : "";
  if (m.format === "pct") return sign + v.toFixed(1) + " pp";
  return sign + v.toFixed(1) + "%";
}
function changeLabel(m) {
  if (state.indicator.single) return "Share in 2023";
  return m.format === "pct" ? "Percentage-Point Change, 2010 to 2023" : "Percent Change, 2010 to 2023";
}

/* ============ HEADLINE ============ */
function updateText() {
  const m = state.metric;
  const focus = changeValue(m, GEOS[0]);
  const city = changeValue(m, GEOS[6]);
  let headline;
  if (state.indicator.single) {
    headline = `Bronzeville Trail: ${m.name.replace("Share of Rentals: ", "")} covers ${focus?.toFixed(1)}% of rentals vs ${city?.toFixed(1)}% citywide`;
  } else if (focus != null && city != null) {
    const dir = focus > city ? "faster" : (focus < city ? "slower" : "similar");
    const unit = m.format === "pct" ? "pp" : "%";
    headline = `Bronzeville Trail changed ${dir} than the city: ${fmtChange(focus, m)} vs ${fmtChange(city, m)}`;
    if (dir === "similar") headline = `Bronzeville Trail tracked the city: ${fmtChange(focus, m)} vs ${fmtChange(city, m)}`;
  }
  d3.select("#headline").text(headline || state.indicator.title);
  const yrs = state.indicator.single ? "2023" : "2010 to 2023";
  d3.select("#subline").text(`${m.name} — ${state.indicator.title}, Bronzeville Trail neighborhoods vs City of Chicago, ${yrs}`);
  d3.select("#source").text("Source: IHS MUSE Dashboard export (Feb 2026) · US Census 5-Year American Community Survey, 2010 and 2023" +
    (state.indicator.note ? " · " + state.indicator.note : "") +
    (state.indicator.id === "subsidy" ? " · Subsidy data: US Dept. of Housing and Urban Development" : ""));
}

function render() {
  updateText();
  d3.select("#chart").selectAll("*").remove();
  const svg = d3.select("#chart").append("svg").attr("viewBox", `0 0 ${W} ${H}`);
  if (state.view === "levels" && !state.indicator.single) renderLevels(svg);
  else renderChange(svg);
}

function geoColor(g) {
  return g.role === "benchmark" ? "var(--gray-bar)" : "var(--navy)";
}

/* Animate only when the page is visible; hidden tabs pause rAF and would
   freeze d3 transitions at their start state. */
function grow(sel) {
  return document.hidden ? sel : sel.transition().duration(620).ease(d3.easeCubicOut);
}

function showTip(event, html) {
  tooltip.html(html).style("opacity", 1)
    .style("left", (event.pageX + 14) + "px")
    .style("top", (event.pageY - 12) + "px");
}
function hideTip() { tooltip.style("opacity", 0); }

function xAxisLabels(g, x) {
  g.selectAll(".tick text").each(function(d) {
    const geo = GEOS.find(gg => gg.id === d);
    const lines = geo.short.split("\n");
    const t = d3.select(this).text(null);
    lines.forEach((line, i) => {
      t.append("tspan").attr("x", 0).attr("dy", i === 0 ? "1em" : "1.15em").text(line);
    });
  });
}

/* --- Ranked change view (deck style) --- */
function renderChange(svg) {
  const m = state.metric;
  const data = GEOS.map(g => ({ geo: g, v: changeValue(m, g) })).filter(d => d.v != null)
    .sort((a, b) => d3.descending(a.v, b.v));

  const x = d3.scaleBand().domain(data.map(d => d.geo.id))
    .range([margin.left, W - margin.right]).padding(0.32);
  const [lo, hi] = d3.extent(data, d => d.v);
  const pad = Math.max((hi - lo) * 0.18, 2);
  const y = d3.scaleLinear()
    .domain([Math.min(0, lo - (lo < 0 ? pad : 0)), Math.max(0, hi + pad)]).nice()
    .range([H - margin.bottom, margin.top]);

  // y axis
  const unit = (state.indicator.single || m.format !== "pct" || state.indicator.single) ? "%" : "pp";
  const yUnit = state.indicator.single ? "%" : (m.format === "pct" ? " pp" : "%");
  svg.append("g").attr("class", "axis")
    .attr("transform", `translate(${margin.left},0)`)
    .call(d3.axisLeft(y).ticks(7).tickFormat(v => v + yUnit).tickSize(0).tickPadding(10))
    .call(g => g.select(".domain").remove());

  // zero line
  svg.append("line").attr("class", "zero-line")
    .attr("x1", margin.left).attr("x2", W - margin.right)
    .attr("y1", y(0)).attr("y2", y(0));

  // bars
  svg.selectAll("rect.bar").data(data).join("rect")
    .attr("class", "bar")
    .attr("x", d => x(d.geo.id))
    .attr("width", x.bandwidth())
    .attr("fill", d => geoColor(d.geo))
    .attr("y", y(0)).attr("height", 0)
    .on("mousemove", (event, d) => {
      const [v10, v23] = m.values[d.geo.id];
      showTip(event, `<strong>${d.geo.name}</strong><br>${m.name}<br>` +
        (state.indicator.single
          ? `2023: <strong>${fmtLevel(v23, m.format)}</strong>`
          : `2010: ${fmtLevel(v10, m.format)}<br>2023: ${fmtLevel(v23, m.format)}<br>Change: <strong>${fmtChange(d.v, m)}</strong>`));
    })
    .on("mouseleave", hideTip);
  grow(svg.selectAll("rect.bar"))
    .attr("y", d => d.v >= 0 ? y(d.v) : y(0))
    .attr("height", d => Math.abs(y(d.v) - y(0)));

  // focus highlight box (red outline, like the deck) — grows with the bar
  const focus = data.find(d => d.geo.role === "focus");
  if (focus) {
    svg.append("rect")
      .attr("x", x(focus.geo.id) - 4)
      .attr("width", x.bandwidth() + 8)
      .attr("fill", "none").attr("stroke", "var(--red)").attr("stroke-width", 3)
      .attr("y", y(0) - 4).attr("height", 8)
      .call(s => grow(s)
        .attr("y", (focus.v >= 0 ? y(focus.v) : y(0)) - 4)
        .attr("height", Math.abs(y(focus.v) - y(0)) + 8));
  }

  // value labels — ride the top of the growing bars
  svg.selectAll("text.bar-label").data(data).join("text")
    .attr("class", "bar-label")
    .attr("text-anchor", "middle")
    .attr("x", d => x(d.geo.id) + x.bandwidth() / 2)
    .text(d => fmtChange(d.v, m))
    .attr("y", d => d.v >= 0 ? y(0) - 12 : y(0) + 22)
    .call(s => grow(s).attr("y", d => d.v >= 0 ? y(d.v) - 12 : y(d.v) + 22));

  // x axis
  svg.append("g").attr("class", "axis axis-x")
    .attr("transform", `translate(0,${H - margin.bottom + 6})`)
    .call(d3.axisBottom(x).tickSize(0))
    .call(g => g.select(".domain").remove())
    .call(g => xAxisLabels(g, x));

  d3.select("#legend").html(
    `<span><span class="swatch" style="background:var(--navy)"></span>${changeLabel(m)}</span>` +
    `<span><span class="swatch" style="background:var(--gray-bar)"></span>City of Chicago benchmark</span>` +
    `<span><span class="swatch" style="border:3px solid var(--red); width:9px; height:9px;"></span>Bronzeville Trail (focus area)</span>`
  );
}

/* --- Grouped 2010 vs 2023 view --- */
function renderLevels(svg) {
  const m = state.metric;
  const years = ["2010", "2023"];
  /* Absolute counts for the whole city dwarf neighborhood bars into invisibility;
     the city benchmark only reads at comparable scales (shares, dollars). */
  const geos = m.format === "count" ? GEOS.filter(g => g.role !== "benchmark") : GEOS;
  const data = geos.map(g => ({ geo: g, v10: m.values[g.id][0], v23: m.values[g.id][1] }));

  const x0 = d3.scaleBand().domain(geos.map(g => g.id))
    .range([margin.left, W - margin.right]).paddingInner(0.3).paddingOuter(0.15);
  const x1 = d3.scaleBand().domain(years).range([0, x0.bandwidth()]).padding(0.12);
  const y = d3.scaleLinear()
    .domain([0, d3.max(data, d => Math.max(d.v10, d.v23)) * 1.12]).nice()
    .range([H - margin.bottom, margin.top]);

  const yFmt = m.format === "pct" ? v => v + "%" : (m.format === "usd" ? v => "$" + d3.format("~s")(v) : v => d3.format("~s")(v));
  svg.append("g").attr("class", "axis")
    .attr("transform", `translate(${margin.left},0)`)
    .call(d3.axisLeft(y).ticks(7).tickFormat(yFmt).tickSize(0).tickPadding(10))
    .call(g => g.select(".domain").remove());

  svg.append("line").attr("class", "zero-line")
    .attr("x1", margin.left).attr("x2", W - margin.right)
    .attr("y1", y(0)).attr("y2", y(0));

  const groups = svg.selectAll("g.geo").data(data).join("g")
    .attr("class", "geo").attr("transform", d => `translate(${x0(d.geo.id)},0)`);

  groups.selectAll("rect").data(d => years.map(yr => ({
      geo: d.geo, yr, v: yr === "2010" ? d.v10 : d.v23
    }))).join("rect")
    .attr("x", d => x1(d.yr)).attr("width", x1.bandwidth())
    .attr("fill", d => {
      if (d.geo.role === "benchmark") return d.yr === "2010" ? "#d7d8d9" : "var(--gray-bar)";
      return d.yr === "2010" ? "#8fa3bd" : "var(--navy)";
    })
    .on("mousemove", (event, d) => {
      showTip(event, `<strong>${d.geo.name}</strong><br>${m.name}, ${d.yr}: <strong>${fmtLevel(d.v, m.format)}</strong>`);
    })
    .on("mouseleave", hideTip)
    .attr("y", y(0)).attr("height", 0)
    .call(s => grow(s).attr("y", d => y(d.v)).attr("height", d => y(0) - y(d.v)));

  // focus underline
  const focusX = x0(GEOS[0].id);
  svg.append("line")
    .attr("x1", focusX - 3).attr("x2", focusX + x0.bandwidth() + 3)
    .attr("y1", H - margin.bottom + 2).attr("y2", H - margin.bottom + 2)
    .attr("stroke", "var(--red)").attr("stroke-width", 3.5);

  svg.append("g").attr("class", "axis axis-x")
    .attr("transform", `translate(0,${H - margin.bottom + 6})`)
    .call(d3.axisBottom(x0).tickSize(0))
    .call(g => g.select(".domain").remove())
    .call(g => xAxisLabels(g, x0));

  d3.select("#legend").html(
    `<span><span class="swatch" style="background:#8fa3bd"></span>2010</span>` +
    `<span><span class="swatch" style="background:var(--navy)"></span>2023</span>` +
    (m.format === "count"
      ? `<span style="color:var(--gray-sub); font-weight:400;">City of Chicago omitted — citywide counts are not scale-comparable</span>`
      : `<span><span class="swatch" style="background:var(--gray-bar)"></span>City of Chicago benchmark</span>`) +
    `<span style="border-bottom:3px solid var(--red); padding-bottom:2px;">Bronzeville Trail (focus area)</span>`
  );
}

populateMetrics();
syncToggle();
render();
</script>
</body>
</html>
