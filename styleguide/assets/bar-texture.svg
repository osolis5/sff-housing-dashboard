<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" font-family="Roboto, Arial, sans-serif">
<defs><linearGradient id="tb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6C82AB"/><stop offset="40%" stop-color="#37548C"/><stop offset="100%" stop-color="#1E2F50"/></linearGradient><filter id="dth4" x="0%" y="0%" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="11" result="noise"/><feColorMatrix in="noise" type="matrix" values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 0 1" result="grey"/><feComponentTransfer in="grey" result="grain"><feFuncR type="linear" slope="0.7" intercept="0.15"/><feFuncG type="linear" slope="0.7" intercept="0.15"/><feFuncB type="linear" slope="0.7" intercept="0.15"/></feComponentTransfer><feBlend in="grain" in2="SourceGraphic" mode="soft-light" result="blended"/><feComposite in="blended" in2="SourceGraphic" operator="in"/></filter></defs>
<rect width="640" height="210" fill="#FFFFFF"/>

<text x="16" y="18" font-size="12" font-weight="500" fill="#191C20">Bar treatment — flat → deep gradient → rounded → rounded + grain</text>
<rect x="30"  y="40" width="80" height="130" fill="#33518A"/>
<text x="70"  y="188" font-size="10" fill="#44474E" text-anchor="middle">flat</text>
<rect x="150" y="40" width="80" height="130" fill="url(#tb)"/>
<text x="190" y="188" font-size="10" fill="#44474E" text-anchor="middle">gradient</text>
<rect x="270" y="40" width="80" height="130" rx="4" fill="url(#tb)"/>
<text x="310" y="188" font-size="10" fill="#44474E" text-anchor="middle">rounded 4px</text>
<rect x="390" y="40" width="80" height="130" rx="4" fill="url(#tb)" filter="url(#dth4)"/>
<text x="430" y="188" font-size="10" fill="#44474E" text-anchor="middle">+ film grain (applied)</text>
<g font-size="10" fill="#74777F">
  <text x="500" y="60">rounding: rx 4 on standalone bars</text>
  <text x="500" y="76">(stacked/diverging stay square)</text>
  <text x="500" y="96">grain: feTurbulence fractalNoise 0.9</text>
  <text x="500" y="112">desaturated · soft-light blend</text>
  <text x="500" y="128">over gradient · clipped to the mark</text>
</g>
</svg>
